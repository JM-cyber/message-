<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💌 A little something for you</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&display=swap');

    *{margin:0;padding:0;box-sizing:border-box}

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a0010 0%, #2d0020 40%, #1a0010 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Lato', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Floating hearts background */
    .hearts-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .heart-float {
      position: absolute;
      font-size: 1.2rem;
      opacity: 0;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(0) scale(0.8) rotate(-10deg); }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { opacity: 0; transform: translateY(-110vh) scale(1.2) rotate(10deg); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 2;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,150,180,0.2);
      border-radius: 28px;
      padding: 52px 44px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 60px rgba(200,0,80,0.25), inset 0 1px 0 rgba(255,200,220,0.1);
      animation: cardIn 1s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes cardIn {
      0%  { opacity:0; transform: scale(0.85) translateY(30px); }
      100%{ opacity:1; transform: scale(1) translateY(0); }
    }

    /* Rose */
    .rose {
      font-size: 3.5rem;
      margin-bottom: 8px;
      display: block;
      animation: rosePulse 2s ease-in-out infinite;
    }
    @keyframes rosePulse {
      0%,100% { transform: scale(1) rotate(-5deg); }
      50%     { transform: scale(1.12) rotate(5deg); }
    }

    /* From */
    .from-label {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,170,190,0.6);
      margin-bottom: 24px;
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      animation: fadeUp 0.6s ease 0.3s both;
      opacity: 0;
    }

    /* Pickup line */
    .pickup {
      font-family: 'Playfair Display', serif;
      font-size: 1.65rem;
      font-style: italic;
      color: #fff;
      line-height: 1.55;
      margin-bottom: 32px;
      animation: fadeUp 0.6s ease 0.5s both;
      opacity: 0;
      text-shadow: 0 2px 20px rgba(255,100,150,0.4);
    }

    /* Divider */
    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,150,180,0.6), transparent);
      margin: 0 auto 28px;
      animation: fadeUp 0.6s ease 0.7s both;
      opacity: 0;
    }

    /* Sub message */
    .sub {
      font-size: 14px;
      color: rgba(255,200,215,0.75);
      line-height: 1.7;
      font-weight: 300;
      animation: fadeUp 0.6s ease 0.9s both;
      opacity: 0;
    }

    /* Heart signature */
    .signature {
      margin-top: 32px;
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      color: rgba(255,150,180,0.5);
      letter-spacing: 0.1em;
      animation: fadeUp 0.6s ease 1.1s both;
      opacity: 0;
    }

    /* Next button */
    .btn {
      margin-top: 28px;
      background: linear-gradient(135deg, #e8316a, #c4154d);
      color: #fff;
      border: none;
      padding: 12px 28px;
      border-radius: 99px;
      font-size: 13px;
      font-family: 'Lato', sans-serif;
      font-weight: 400;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(200,0,80,0.35);
      animation: fadeUp 0.6s ease 1.3s both;
      opacity: 0;
    }
    .btn:hover { transform: scale(1.06); box-shadow: 0 6px 28px rgba(200,0,80,0.5); }

    @keyframes fadeUp {
      0%  { opacity:0; transform: translateY(14px); }
      100%{ opacity:1; transform: translateY(0); }
    }

    /* Sparkles */
    .sparkle {
      position: absolute;
      font-size: 1rem;
      animation: sparklePop 3s ease-in-out infinite;
      opacity: 0;
    }
    @keyframes sparklePop {
      0%,100%{ opacity:0; transform:scale(0.5); }
      50%    { opacity:1; transform:scale(1.2); }
    }
  </style>
</head>
<body>

  <!-- Floating hearts -->
  <div class="hearts-bg" id="heartsBg"></div>

  <!-- Card -->
  <div class="card">
    <span class="sparkle" style="top:18px;left:24px;animation-delay:0s">✨</span>
    <span class="sparkle" style="top:18px;right:24px;animation-delay:1s">💫</span>
    <span class="sparkle" style="bottom:28px;left:32px;animation-delay:2s">⭐</span>
    <span class="sparkle" style="bottom:28px;right:32px;animation-delay:0.5s">✨</span>

    <span class="rose">🌹</span>
    <div class="from-label">a little note for you</div>

    <div class="pickup" id="pickupText">
      "If you were a star, you'd be the brightest one — and I'd spend every night looking up."
    </div>

    <div class="divider"></div>

    <div class="sub">
      You make ordinary moments feel extraordinary.<br>
      Just thought you should know. 💕
    </div>

    <div class="signature">— With Love, JM 🌸</div>


  </div>

  <script>
    var lines = [
      "If you were a star, you'd be the brightest one — and I'd spend every night looking up.",
      "If you were a star, you'd be the brightest one — and I'd spend every night looking up.",
      "I must be lost… because heaven is a long way from here, yet here you are.",
      "Do you have a map? I keep getting lost in your eyes.",
      "Is your name Google? Because you have everything I've been searching for.",
      "If kisses were snowflakes, I'd send you a blizzard.",
      "You must be made of copper and tellurium — because you are CuTe.",
      "Even in a room full of art, I'd still stare at you.",
      "My heart literally skips a beat every single time I see you.",
      "You are the reason I look down at my phone and smile — and then walk into walls."
    ];
    var current = 0;

    function nextLine() {
      current = (current + 1) % lines.length;
      var el = document.getElementById('pickupText');
      el.style.opacity = '0';
      el.style.transform = 'translateY(10px)';
      el.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
      setTimeout(function() {
        el.textContent = '"' + lines[current] + '"';
        el.style.opacity = '1';
        el.style.transform = 'translateY(0)';
      }, 300);
    }

    // Generate floating hearts
    var emojis = ['❤️','💕','💗','💓','💘','🌹','💝','💖'];
    var bg = document.getElementById('heartsBg');
    for (var i = 0; i < 18; i++) {
      var h = document.createElement('div');
      h.className = 'heart-float';
      h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      h.style.left = Math.random() * 100 + 'vw';
      h.style.bottom = '-50px';
      h.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
      h.style.animationDuration = (6 + Math.random() * 10) + 's';
      h.style.animationDelay = (Math.random() * 8) + 's';
      bg.appendChild(h);
    }
  </script>

</body>
</html>
