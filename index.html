<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Note For You</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400;1,500&family=DM+Sans:wght@300;400&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0b1628;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .icon-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .fi {
      position: absolute;
      animation: floatIcon linear infinite;
      line-height: 1;
    }

    @keyframes floatIcon {
      0%   { transform: translateY(0px) rotate(0deg); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-110vh) rotate(20deg); opacity: 0; }
    }

    .vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: radial-gradient(ellipse at center, rgba(11,22,40,0.25) 0%, rgba(8,14,26,0.88) 100%);
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 480px;
      width: 90%;
      padding: 40px 24px;
    }

    .eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(200,169,110,0.65);
      margin-bottom: 28px;
      animation: fadeUp 0.8s ease 0.1s both;
    }

    .quote {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.6rem, 4vw, 2.1rem);
      font-style: italic;
      font-weight: 400;
      color: #dde6f8;
      line-height: 1.65;
      margin-bottom: 28px;
      animation: fadeUp 0.8s ease 0.3s both;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 0 auto 26px;
      width: fit-content;
      animation: fadeUp 0.8s ease 0.5s both;
    }
    .dline { width: 44px; height: 1px; background: rgba(74,127,193,0.3); }
    .ddot  { width: 4px; height: 4px; border-radius: 50%; background: rgba(200,169,110,0.5); }

    .body {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 300;
      color: rgba(160,185,235,0.5);
      line-height: 1.9;
      margin-bottom: 34px;
      animation: fadeUp 0.8s ease 0.7s both;
    }

    .sig {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-style: italic;
      color: rgba(74,127,193,0.4);
      letter-spacing: 0.08em;
      animation: fadeUp 0.8s ease 0.9s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="icon-layer" id="iconLayer"></div>
  <div class="vignette"></div>

  <div class="content">
    <div class="eyebrow">A note for you</div>
    <div class="quote">"Your career is not a straight line —<br>it's a story worth believing in."</div>
    <div class="divider">
      <div class="dline"></div>
      <div class="ddot"></div>
      <div class="dline"></div>
    </div>
    <div class="body">
      Every step forward, every stumble, every restart — it all counts.<br>
      Trust the path. Trust yourself.
    </div>
    <div class="sig">— Believe in your journey</div>
  </div>

  <script>
    var icons = [
      '💼','💻','🖥️','🖊️','📋','📁','📊','📈','🗂️','🖨️',
      '☎️','📌','📎','🗒️','🖱️','⌨️','📐','📏','🗃️','📬'
    ];

    var layer = document.getElementById('iconLayer');

    function spawnIcon() {
      var el = document.createElement('div');
      el.className = 'fi';
      el.textContent = icons[Math.floor(Math.random() * icons.length)];

      var size  = 18 + Math.random() * 22;
      var dur   = 9 + Math.random() * 12;
      var left  = 3 + Math.random() * 94;
      var delay = Math.random() * -dur;
      var gold  = Math.random() > 0.7;

      el.style.fontSize = size + 'px';
      el.style.left = left + '%';
      el.style.bottom = '-60px';
      el.style.animationDuration = dur + 's';
      el.style.animationDelay = delay + 's';
      el.style.filter = 'opacity(' + (gold ? '0.15' : '0.18') + ') ' +
        (gold ? 'sepia(1) saturate(2) hue-rotate(5deg)' : 'sepia(1) saturate(3) hue-rotate(190deg)');

      layer.appendChild(el);

      setTimeout(function() {
        if (el.parentNode) el.parentNode.removeChild(el);
      }, (dur + Math.abs(delay)) * 1000 + 2000);
    }

    for (var i = 0; i < 26; i++) { spawnIcon(); }
    setInterval(spawnIcon, 800);
  </script>

</body>
</html>
